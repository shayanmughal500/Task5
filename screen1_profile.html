<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram – Profile Screen</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #e91e8c;
      --magenta: #c2185b;
      --purple:  #7b1fa2;
      --grad1: linear-gradient(135deg, #f48fb1 0%, #e91e8c 50%, #9c27b0 100%);
      --grad2: linear-gradient(135deg, #ff6ec7 0%, #da2083 100%);
      --bg: #fafafa;
      --border: #efefef;
      --text: #262626;
      --muted: #8e8e8e;
    }

    body {
      background: #e8d5f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
    }

    /* ── Phone Shell ── */
    .phone {
      width: 340px;
      height: 700px;
      background: #111;
      border-radius: 44px;
      padding: 10px;
      box-shadow: 0 30px 80px rgba(0,0,0,.45), inset 0 0 0 2px #333;
      position: relative;
    }
    .notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 24px;
      background: #111;
      border-radius: 0 0 18px 18px;
      z-index: 10;
    }
    .screen {
      width: 100%;
      height: 100%;
      background: var(--bg);
      border-radius: 36px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 4px;
      font-size: 10px;
      font-weight: 700;
      color: var(--text);
    }
    .status-icons { display: flex; gap: 5px; align-items: center; }
    .bar { width: 4px; background: var(--text); border-radius: 1px; }
    .bar:nth-child(1){height:5px;} .bar:nth-child(2){height:7px;} .bar:nth-child(3){height:9px;} .bar:nth-child(4){height:11px;}
    .wifi { width: 12px; height: 9px; border: 2px solid var(--text); border-bottom: none; border-radius: 8px 8px 0 0; position: relative; }
    .wifi::after { content:''; position:absolute; bottom:-2px; left:50%; transform:translateX(-50%); width:3px; height:3px; background:var(--text); border-radius:50%; }
    .battery { width: 18px; height: 9px; border: 1.5px solid var(--text); border-radius: 2px; position: relative; }
    .battery::after { content:''; position:absolute; right:-4px; top:50%; transform:translateY(-50%); width:3px; height:5px; background:var(--text); border-radius:0 1px 1px 0; }
    .battery-fill { margin: 1.5px; height: calc(100% - 3px); width: 70%; background: var(--text); border-radius: 1px; }

    /* ── Top Nav ── */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 16px;
    }
    .username { font-size: 15px; font-weight: 800; color: var(--text); }
    .nav-icons { display: flex; gap: 14px; }
    .nav-icon { width: 22px; height: 22px; fill: none; stroke: var(--text); stroke-width: 2; }

    /* ── Profile Header ── */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 16px;
    }
    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .avatar-ring {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: var(--grad1);
      padding: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #fce4ec;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .add-btn {
      position: absolute;
      bottom: 0; right: 0;
      width: 20px; height: 20px;
      background: var(--pink);
      border-radius: 50%;
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }
    .stats {
      display: flex;
      gap: 18px;
      flex: 1;
      justify-content: center;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 15px; font-weight: 800; color: var(--text); }
    .stat-lbl { font-size: 10px; color: var(--muted); font-weight: 600; }

    /* ── Bio ── */
    .bio { padding: 4px 16px 8px; }
    .bio-name { font-size: 13px; font-weight: 800; color: var(--text); }
    .bio-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .skeleton { height: 8px; border-radius: 4px; background: #e0e0e0; margin: 4px 0; }
    .sk-w80 { width: 80%; }
    .sk-w60 { width: 60%; }

    /* ── Action Buttons ── */
    .action-btns {
      display: flex;
      gap: 6px;
      padding: 6px 16px 10px;
    }
    .btn-follow {
      flex: 1;
      height: 30px;
      background: var(--grad1);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }
    .btn-msg {
      flex: 1;
      height: 30px;
      background: #fff;
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }
    .btn-more {
      width: 30px;
      height: 30px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* ── Highlights ── */
    .highlights {
      display: flex;
      gap: 14px;
      padding: 8px 16px;
      overflow-x: auto;
    }
    .highlight-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .hl-ring {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--grad1);
      padding: 2px;
    }
    .hl-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #fce4ec;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      border: 2px solid #fff;
    }
    .hl-add {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px dashed #ccc;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      color: #ccc;
    }
    .hl-label { font-size: 9px; color: var(--muted); font-weight: 600; }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab.active { border-bottom-color: var(--text); }
    .tab svg { width: 20px; height: 20px; fill: none; stroke: var(--muted); stroke-width: 1.5; }
    .tab.active svg { stroke: var(--text); }

    /* ── Grid ── */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      flex: 1;
      overflow-y: auto;
    }
    .post-cell {
      aspect-ratio: 1;
      overflow: hidden;
    }
    .post-cell div {
      width: 100%; height: 100%;
    }
    .g1 { background: linear-gradient(135deg, #f48fb1, #e91e8c); }
    .g2 { background: linear-gradient(135deg, #ff80ab, #f06292); }
    .g3 { background: linear-gradient(135deg, #ce93d8, #9c27b0); }
    .g4 { background: linear-gradient(135deg, #f8bbd0, #f48fb1); }
    .g5 { background: linear-gradient(135deg, #e91e8c, #880e4f); }
    .g6 { background: linear-gradient(135deg, #ba68c8, #7b1fa2); }

    /* ── Bottom Nav ── */
    .bottom-nav {
      display: flex;
      padding: 10px 0 16px;
      border-top: 1px solid var(--border);
      justify-content: space-around;
    }
    .bn-icon { width: 24px; height: 24px; fill: none; stroke: var(--text); stroke-width: 2; }
    .bn-icon.active { stroke: var(--text); fill: var(--text); }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">

      <!-- Status Bar -->
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <div style="display:flex;gap:1px;align-items:flex-end">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>
          <div class="wifi"></div>
          <div class="battery"><div class="battery-fill"></div></div>
        </div>
      </div>

      <!-- Top Nav -->
      <div class="top-nav">
        <span class="username">@aurora.vibes</span>
        <div class="nav-icons">
          <!-- bell -->
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <!-- menu -->
          <svg class="nav-icon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </div>
      </div>

      <!-- Profile Header -->
      <div class="profile-header">
        <div class="avatar-wrap">
          <div class="avatar-ring">
            <div class="avatar-inner">🌸</div>
          </div>
          <div class="add-btn">+</div>
        </div>
        <div class="stats">
          <div class="stat"><div class="stat-num">84</div><div class="stat-lbl">Posts</div></div>
          <div class="stat"><div class="stat-num">12.4k</div><div class="stat-lbl">Followers</div></div>
          <div class="stat"><div class="stat-num">310</div><div class="stat-lbl">Following</div></div>
        </div>
      </div>

      <!-- Bio -->
      <div class="bio">
        <div class="bio-name">Aurora Vibes ✨</div>
        <div class="skeleton sk-w80"></div>
        <div class="skeleton sk-w60"></div>
      </div>

      <!-- Action Buttons -->
      <div class="action-btns">
        <button class="btn-follow">Follow</button>
        <button class="btn-msg">Message</button>
        <div class="btn-more">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <!-- Highlights -->
      <div class="highlights">
        <div class="highlight-item">
          <div class="hl-add">+</div>
          <span class="hl-label">New</span>
        </div>
        <div class="highlight-item">
          <div class="hl-ring"><div class="hl-inner">🌺</div></div>
          <span class="hl-label">Travel</span>
        </div>
        <div class="highlight-item">
          <div class="hl-ring"><div class="hl-inner">💜</div></div>
          <span class="hl-label">Style</span>
        </div>
        <div class="highlight-item">
          <div class="hl-ring"><div class="hl-inner">🍓</div></div>
          <span class="hl-label">Food</span>
        </div>
      </div>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <div class="tab active">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </div>
        <div class="tab">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
      </div>

      <!-- Post Grid -->
      <div class="post-grid">
        <div class="post-cell"><div class="g1"></div></div>
        <div class="post-cell"><div class="g2"></div></div>
        <div class="post-cell"><div class="g3"></div></div>
        <div class="post-cell"><div class="g4"></div></div>
        <div class="post-cell"><div class="g5"></div></div>
        <div class="post-cell"><div class="g6"></div></div>
      </div>

      <!-- Bottom Nav -->
      <div class="bottom-nav">
        <!-- home -->
        <svg class="bn-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <!-- search -->
        <svg class="bn-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <!-- add -->
        <svg class="bn-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <!-- heart -->
        <svg class="bn-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <!-- profile -->
        <svg class="bn-icon active" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>

    </div>
  </div>
</body>
</html>
