<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram – Explore Screen</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #e91e8c;
      --purple:  #7b1fa2;
      --grad1: linear-gradient(135deg, #f48fb1 0%, #e91e8c 50%, #9c27b0 100%);
      --bg: #fafafa;
      --border: #efefef;
      --text: #262626;
      --muted: #8e8e8e;
    }

    body {
      background: #e8d5f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
    }

    /* ── Phone Shell ── */
    .phone {
      width: 340px;
      height: 700px;
      background: #111;
      border-radius: 44px;
      padding: 10px;
      box-shadow: 0 30px 80px rgba(0,0,0,.45), inset 0 0 0 2px #333;
      position: relative;
    }
    .notch {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 24px;
      background: #111;
      border-radius: 0 0 18px 18px;
      z-index: 10;
    }
    .screen {
      width: 100%; height: 100%;
      background: var(--bg);
      border-radius: 36px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 4px;
      font-size: 10px; font-weight: 700; color: var(--text);
    }
    .status-icons { display: flex; gap: 5px; align-items: center; }
    .bar { width: 4px; background: var(--text); border-radius: 1px; }
    .bar:nth-child(1){height:5px;} .bar:nth-child(2){height:7px;} .bar:nth-child(3){height:9px;} .bar:nth-child(4){height:11px;}
    .battery { width: 18px; height: 9px; border: 1.5px solid var(--text); border-radius: 2px; position: relative; }
    .battery::after { content:''; position:absolute; right:-4px; top:50%; transform:translateY(-50%); width:3px; height:5px; background:var(--text); border-radius:0 1px 1px 0; }
    .battery-fill { margin: 1.5px; height: calc(100% - 3px); width: 70%; background: var(--text); border-radius: 1px; }

    /* ── Search Bar ── */
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
    }
    .search-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: #f0f0f0;
      border-radius: 10px;
      padding: 7px 10px;
      gap: 6px;
    }
    .search-bar svg { width: 14px; height: 14px; fill: none; stroke: var(--muted); stroke-width: 2; flex-shrink: 0; }
    .search-placeholder { font-size: 12px; color: var(--muted); font-weight: 600; }
    .filter-btn {
      width: 34px; height: 34px;
      background: #f0f0f0;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .filter-btn svg { width: 16px; height: 16px; fill: none; stroke: var(--text); stroke-width: 2; }

    /* ── Filter Chips ── */
    .filter-chips {
      display: flex;
      gap: 8px;
      padding: 4px 14px 8px;
      overflow-x: auto;
    }
    .filter-chips::-webkit-scrollbar { display: none; }
    .chip {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .chip.active { background: var(--grad1); color: #fff; }
    .chip.inactive { background: #f0f0f0; color: var(--text); }

    /* ── Explore Grid ── */
    /*
      Layout mirrors the mockup:
      Row 1: 1 big cell (spans 2 rows) + 2 small stacked cells
      Row 2: 3 equal cells
      Row 3: 2 small + 1 big (spans 2 rows) — mirrored
      Uses CSS Grid with explicit template areas for perfect control
    */
    .explore-grid {
      flex: 1;
      overflow-y: auto;
      padding: 2px;
    }
    .explore-grid::-webkit-scrollbar { display: none; }

    .grid-block {
      display: grid;
      gap: 2px;
    }

    /* Block A: big-left layout */
    .block-a {
      grid-template-columns: 2fr 1fr;
      grid-template-rows: repeat(2, 90px);
    }
    .block-a .big { grid-row: 1 / 3; }

    /* Block B: 3 equal */
    .block-b {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 90px;
    }

    /* Block C: big-right layout */
    .block-c {
      grid-template-columns: 1fr 2fr;
      grid-template-rows: repeat(2, 90px);
    }
    .block-c .big { grid-row: 1 / 3; grid-column: 2; }
    .block-c .sm1 { grid-row: 1; grid-column: 1; }
    .block-c .sm2 { grid-row: 2; grid-column: 1; }

    .cell {
      overflow: hidden;
      position: relative;
    }
    .cell-inner { width: 100%; height: 100%; }

    /* Gradient fills */
    .c1  { background: linear-gradient(135deg, #f8a5c2, #e91e8c); }
    .c2  { background: linear-gradient(160deg, #ffa0c5, #f06292); }
    .c3  { background: linear-gradient(135deg, #ce93d8, #9c27b0); }
    .c4  { background: linear-gradient(135deg, #ffb3d1, #e91e8c, #880e4f); }
    .c5  { background: linear-gradient(135deg, #f9a8d4, #f472b6); }
    .c6  { background: linear-gradient(160deg, #d946ef, #9333ea); }
    .c7  { background: linear-gradient(135deg, #fda4af, #f43f5e); }
    .c8  { background: linear-gradient(135deg, #c084fc, #7c3aed); }
    .c9  { background: linear-gradient(135deg, #fbcfe8, #e91e8c, #7b1fa2); }
    .c10 { background: linear-gradient(135deg, #fbbf24, #f97316, #e91e8c); }
    .c11 { background: linear-gradient(135deg, #86efac, #3b82f6, #9c27b0); }
    .c12 { background: linear-gradient(135deg, #f472b6, #a855f7); }

    /* ── Bottom Nav ── */
    .bottom-nav {
      display: flex;
      padding: 10px 0 16px;
      border-top: 1px solid var(--border);
      justify-content: space-around;
    }
    .bn-icon { width: 24px; height: 24px; fill: none; stroke: var(--text); stroke-width: 2; }
    .bn-icon.active { fill: var(--text); }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">

      <!-- Status Bar -->
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <div style="display:flex;gap:1px;align-items:flex-end">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>
          <div class="battery"><div class="battery-fill"></div></div>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="search-wrap">
        <div class="search-bar">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span class="search-placeholder">Search</span>
        </div>
        <div class="filter-btn">
          <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        </div>
      </div>

      <!-- Filter Chips -->
      <div class="filter-chips">
        <button class="chip active">For You</button>
        <button class="chip inactive">Travel</button>
        <button class="chip inactive">Fashion</button>
        <button class="chip inactive">Art</button>
        <button class="chip inactive">Food</button>
      </div>

      <!-- Explore Grid -->
      <div class="explore-grid">

        <!-- Block A: big left + 2 small right -->
        <div class="grid-block block-a" style="margin-bottom:2px;">
          <div class="cell big"><div class="cell-inner c1"></div></div>
          <div class="cell"><div class="cell-inner c2"></div></div>
          <div class="cell"><div class="cell-inner c3"></div></div>
        </div>

        <!-- Block B: 3 equal -->
        <div class="grid-block block-b" style="margin-bottom:2px;">
          <div class="cell"><div class="cell-inner c4"></div></div>
          <div class="cell"><div class="cell-inner c5"></div></div>
          <div class="cell"><div class="cell-inner c6"></div></div>
        </div>

        <!-- Block C: 2 small left + big right -->
        <div class="grid-block block-c" style="margin-bottom:2px;">
          <div class="cell sm1"><div class="cell-inner c7"></div></div>
          <div class="cell sm2"><div class="cell-inner c8"></div></div>
          <div class="cell big"><div class="cell-inner c9"></div></div>
        </div>

        <!-- Block B again -->
        <div class="grid-block block-b">
          <div class="cell"><div class="cell-inner c10"></div></div>
          <div class="cell"><div class="cell-inner c11"></div></div>
          <div class="cell"><div class="cell-inner c12"></div></div>
        </div>

      </div>

      <!-- Bottom Nav -->
      <div class="bottom-nav">
        <svg class="bn-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <svg class="bn-icon active" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <svg class="bn-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <svg class="bn-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <svg class="bn-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>

    </div>
  </div>
</body>
</html>
