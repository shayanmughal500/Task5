<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram – Feed Screen</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #e91e8c;
      --purple:  #7b1fa2;
      --grad1: linear-gradient(135deg, #f48fb1 0%, #e91e8c 50%, #9c27b0 100%);
      --bg: #fafafa;
      --border: #efefef;
      --text: #262626;
      --muted: #8e8e8e;
    }

    body {
      background: #e8d5f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
    }

    /* ── Phone Shell ── */
    .phone {
      width: 340px;
      height: 700px;
      background: #111;
      border-radius: 44px;
      padding: 10px;
      box-shadow: 0 30px 80px rgba(0,0,0,.45), inset 0 0 0 2px #333;
      position: relative;
    }
    .notch {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 24px;
      background: #111;
      border-radius: 0 0 18px 18px;
      z-index: 10;
    }
    .screen {
      width: 100%; height: 100%;
      background: var(--bg);
      border-radius: 36px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 4px;
      font-size: 10px; font-weight: 700; color: var(--text);
    }
    .status-icons { display: flex; gap: 5px; align-items: center; }
    .bar { width: 4px; background: var(--text); border-radius: 1px; }
    .bar:nth-child(1){height:5px;} .bar:nth-child(2){height:7px;} .bar:nth-child(3){height:9px;} .bar:nth-child(4){height:11px;}
    .battery { width: 18px; height: 9px; border: 1.5px solid var(--text); border-radius: 2px; position: relative; }
    .battery::after { content:''; position:absolute; right:-4px; top:50%; transform:translateY(-50%); width:3px; height:5px; background:var(--text); border-radius:0 1px 1px 0; }
    .battery-fill { margin: 1.5px; height: calc(100% - 3px); width: 70%; background: var(--text); border-radius: 1px; }

    /* ── Top Nav ── */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 16px 6px;
    }
    .logo { font-size: 18px; font-weight: 800; background: var(--grad1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .top-icons { display: flex; gap: 14px; align-items: center; }
    .icon { width: 22px; height: 22px; fill: none; stroke: var(--text); stroke-width: 2; }
    .heart-notif { position: relative; }
    .notif-dot {
      position: absolute; top: -2px; right: -2px;
      width: 8px; height: 8px;
      background: var(--pink);
      border-radius: 50%;
      border: 1.5px solid var(--bg);
    }

    /* ── Stories Row ── */
    .stories {
      display: flex;
      gap: 12px;
      padding: 8px 16px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
    }
    .stories::-webkit-scrollbar { display: none; }
    .story-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .story-ring {
      width: 54px; height: 54px;
      border-radius: 50%;
      background: var(--grad1);
      padding: 2.5px;
      position: relative;
    }
    .story-ring.seen { background: linear-gradient(135deg, #ccc, #e0e0e0); }
    .story-avatar {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #fce4ec;
      border: 2px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      overflow: hidden;
    }
    .story-add {
      position: absolute; bottom: 0; right: 0;
      width: 16px; height: 16px;
      background: var(--pink);
      border-radius: 50%;
      border: 2px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 10px;
      font-weight: 900;
    }
    .story-lbl { font-size: 9px; color: var(--text); font-weight: 600; white-space: nowrap; }

    /* ── Feed ── */
    .feed {
      flex: 1;
      overflow-y: auto;
    }
    .feed::-webkit-scrollbar { display: none; }

    /* Post */
    .post { border-bottom: 1px solid var(--border); }
    .post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
    }
    .post-user { display: flex; align-items: center; gap: 8px; }
    .post-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--grad1);
      padding: 2px;
    }
    .post-avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #fce4ec;
      border: 2px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .post-username { font-size: 12px; font-weight: 800; color: var(--text); }
    .post-location { font-size: 10px; color: var(--muted); }
    .dots { font-size: 18px; color: var(--muted); line-height: 1; letter-spacing: 1px; }

    /* Post Image */
    .post-image {
      width: 100%;
      aspect-ratio: 1 / 0.75;
    }
    .post-img-1 { background: linear-gradient(135deg, #f8bbd0 0%, #e91e8c 50%, #9c27b0 100%); }
    .post-img-2 { background: linear-gradient(160deg, #7b1fa2 0%, #c2185b 50%, #ff80ab 100%); }

    /* Post Actions */
    .post-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 6px;
    }
    .actions-left { display: flex; gap: 14px; align-items: center; }
    .action-icon { width: 22px; height: 22px; fill: none; stroke: var(--text); stroke-width: 2; cursor: pointer; }
    .action-icon.liked { stroke: #ed4956; fill: #ed4956; }
    .bookmark-icon { width: 20px; height: 20px; fill: none; stroke: var(--text); stroke-width: 2; }

    .likes { font-size: 12px; font-weight: 800; color: var(--text); padding: 0 12px 2px; }
    .caption { font-size: 11px; color: var(--text); padding: 0 12px 4px; }
    .caption span { font-weight: 800; }
    .time { font-size: 9px; color: var(--muted); padding: 0 12px 10px; text-transform: uppercase; letter-spacing: .5px; }
    .comment-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 12px 8px;
    }
    .mini-avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ce93d8, #9c27b0);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
    }
    .comment-skeleton { height: 7px; border-radius: 4px; background: #e8e8e8; width: 160px; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      display: flex;
      padding: 10px 0 16px;
      border-top: 1px solid var(--border);
      justify-content: space-around;
    }
    .bn-icon { width: 24px; height: 24px; fill: none; stroke: var(--text); stroke-width: 2; }
    .bn-icon.active { fill: var(--text); }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">

      <!-- Status Bar -->
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <div style="display:flex;gap:1px;align-items:flex-end">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>
          <div class="battery"><div class="battery-fill"></div></div>
        </div>
      </div>

      <!-- Top Nav -->
      <div class="top-nav">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2">
          <rect x="2" y="3" width="7" height="7" rx="1"/><rect x="15" y="3" width="7" height="7" rx="1"/><rect x="2" y="15" width="7" height="7" rx="1"/><rect x="15" y="15" width="7" height="7" rx="1"/>
        </svg>
        <span class="logo">Instagram</span>
        <div class="top-icons">
          <!-- send icon -->
          <svg class="icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          <!-- notif icon -->
          <div class="heart-notif">
            <svg class="icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <div class="notif-dot"></div>
          </div>
        </div>
      </div>

      <!-- Stories -->
      <div class="stories">
        <div class="story-item">
          <div class="story-ring" style="background:none;border:2px dashed #ccc;display:flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:50%;position:relative;">
            <span style="font-size:22px;color:#ccc;position:absolute;">+</span>
          </div>
          <span class="story-lbl">Your Story</span>
        </div>
        <div class="story-item">
          <div class="story-ring"><div class="story-avatar">🌸</div></div>
          <span class="story-lbl">aurora</span>
        </div>
        <div class="story-item">
          <div class="story-ring"><div class="story-avatar">🦋</div></div>
          <span class="story-lbl">luna</span>
        </div>
        <div class="story-item">
          <div class="story-ring"><div class="story-avatar">🌙</div></div>
          <span class="story-lbl">nova</span>
        </div>
        <div class="story-item">
          <div class="story-ring seen"><div class="story-avatar">🌺</div></div>
          <span class="story-lbl">iris</span>
        </div>
      </div>

      <!-- Feed -->
      <div class="feed">

        <!-- Post 1 -->
        <div class="post">
          <div class="post-header">
            <div class="post-user">
              <div class="post-avatar"><div class="post-avatar-inner">🌸</div></div>
              <div>
                <div class="post-username">aurora.vibes</div>
                <div class="post-location">Paris, France</div>
              </div>
            </div>
            <span class="dots">···</span>
          </div>
          <div class="post-image post-img-1"></div>
          <div class="post-actions">
            <div class="actions-left">
              <svg class="action-icon liked" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              <svg class="action-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <svg class="action-icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </div>
            <svg class="bookmark-icon" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="likes">2,847 likes</div>
          <div class="caption"><span>aurora.vibes</span> Chasing pink sunsets 🌸✨</div>
          <div class="comment-row">
            <div class="mini-avatar">🦋</div>
            <div class="comment-skeleton"></div>
          </div>
          <div class="time">2 hours ago</div>
        </div>

        <!-- Post 2 -->
        <div class="post">
          <div class="post-header">
            <div class="post-user">
              <div class="post-avatar" style="background:linear-gradient(135deg,#9c27b0,#e91e8c)"><div class="post-avatar-inner">🦋</div></div>
              <div>
                <div class="post-username">luna.dreams</div>
                <div class="post-location">Tokyo, Japan</div>
              </div>
            </div>
            <span class="dots">···</span>
          </div>
          <div class="post-image post-img-2"></div>
          <div class="post-actions">
            <div class="actions-left">
              <svg class="action-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              <svg class="action-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <svg class="action-icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </div>
            <svg class="bookmark-icon" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="likes">1,203 likes</div>
          <div class="caption"><span>luna.dreams</span> Purple haze, dreamy days 💜</div>
          <div class="comment-row">
            <div class="mini-avatar">🌸</div>
            <div class="comment-skeleton" style="width:120px"></div>
          </div>
          <div class="time">5 hours ago</div>
        </div>

      </div>

      <!-- Bottom Nav -->
      <div class="bottom-nav">
        <svg class="bn-icon active" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <svg class="bn-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <svg class="bn-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <svg class="bn-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <svg class="bn-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>

    </div>
  </div>
</body>
</html>
